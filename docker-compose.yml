services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/playdex?serverVersion=8.4&charset=utf8mb4"

  frontend:
    build:
      context: ./frontend
      args:
        # Passé au BUILD (les variables NEXT_PUBLIC_* sont figées à ce moment-là).
        # Le navigateur appelle localhost:8000 = le port exposé par le backend.
        NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
    ports:
      - "3000:3000"

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: playdex
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
